<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rounded blue tile -->
  <rect width="64" height="64" rx="12" fill="#0d6efd"/>
  <!-- Dashed planned line, corner to corner -->
  <line x1="14" y1="50" x2="50" y2="14"
        stroke="#ffffff" stroke-width="5"
        stroke-dasharray="5 4" stroke-linecap="round"
        opacity="0.95"/>
  <!-- Deviating team track -->
  <path d="M14 50 Q 24 28 34 36 T 50 14"
        fill="none" stroke="#ffd400" stroke-width="5" stroke-linecap="round"/>
  <!-- Start and end dots -->
  <circle cx="14" cy="50" r="5.5" fill="#ffffff" stroke="#0d6efd" stroke-width="2"/>
  <circle cx="50" cy="14" r="5.5" fill="#ffffff" stroke="#0d6efd" stroke-width="2"/>
</svg>
